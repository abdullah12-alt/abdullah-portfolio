<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colleague Endorsements | Abdullah Hassan - Senior .NET Developer</title>
    <meta name="description"
        content="Read professional testimonials and endorsements for Abdullah Hassan, a Senior .NET Developer specializing in Fintech and Healthcare solutions.">
    <link rel="canonical" href="https://abdullahhassan.online/testimonial-detail.html">

    <!-- Open Graph -->
    <meta property="og:title" content="What Colleagues Say About Abdullah Hassan">
    <meta property="og:description"
        content="Professional endorsements of Abdullah Hassan's technical expertise in .NET and Angular.">
    <meta property="og:url" content="https://abdullahhassan.online/testimonial-detail.html">
    <meta property="og:type" content="article">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.svg">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        .detail-section {
            min-height: 100vh;
            padding: 120px 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .detail-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-3xl);
            max-width: 800px;
            width: 90%;
            position: relative;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: var(--spacing-xl);
            transition: color var(--transition-base);
        }

        .back-btn:hover {
            color: var(--primary-color);
        }

        .detail-content {
            font-size: var(--font-size-lg);
            color: var(--text-primary);
            line-height: 2;
            font-style: italic;
            margin-bottom: var(--spacing-2xl);
        }

        .detail-author {
            display: flex;
            align-items: center;
            gap: var(--spacing-lg);
            border-top: 1px solid var(--border-color);
            padding-top: var(--spacing-xl);
        }

        .detail-author img {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-full);
            border: 3px solid var(--primary-color);
        }
    </style>
</head>

<body>
    <canvas id="three-canvas"></canvas>

    <nav id="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center; gap: 5px;">
                    <span class="logo-first">Abdullah</span>
                    <span class="logo-last">Hassan</span>
                    <span class="logo-pulse"></span>
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html#home" class="nav-link">Home</a></li>
                <li><a href="index.html#testimonials" class="nav-link">Back to Portfolio</a></li>
            </ul>
        </div>
    </nav>

    <section class="detail-section">
        <div class="container">
            <a href="index.html#testimonials" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Testimonials
            </a>
            <div id="detail-container">
                <!-- Content injected by JS -->
                <div class="loader">Loading...</div>
            </div>
        </div>
    </section>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Simple 3D background for this page
        let scene, camera, renderer, particles;
        function initThreeJS() {
            const canvas = document.getElementById('three-canvas');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;
            renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(500 * 3);
            for (let i = 0; i < 500 * 3; i++) positions[i] = (Math.random() - 0.5) * 100;
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ size: 0.5, color: 0xcccccc, transparent: true, opacity: 0.5 });
            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            function animate() {
                requestAnimationFrame(animate);
                particles.rotation.y += 0.001;
                renderer.render(scene, camera);
            }
            animate();
        }
        window.addEventListener('load', initThreeJS);

        // Load detail
        async function loadDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const container = document.getElementById('detail-container');

            try {
                const response = await fetch('data/testimonials.json');
                const testimonials = await response.json();
                const item = testimonials.find(t => t.id === id);

                if (item) {
                    container.innerHTML = `
                        <div class="detail-card">
                            <div class="testimonial-icon" style="top: 20px;">
                                <i class="fas fa-quote-right"></i>
                            </div>
                            <p class="detail-content">"${item.content}"</p>
                            <div class="detail-author">
                                <img src="${item.image}" alt="${item.name}">
                                <div class="author-info">
                                    <h3 style="font-size: 1.5rem; margin-bottom: 5px;">${item.name}</h3>
                                    <p style="color: var(--primary-color); font-weight: 600;">${item.position}</p>
                                    <p style="color: var(--text-muted); font-size: 0.9rem;">${item.company}</p>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    container.innerHTML = `<p>Testimonial not found.</p>`;
                }
            } catch (error) {
                console.error('Error fetching detail:', error);
                container.innerHTML = `<p>Error loading content.</p>`;
            }
        }
        loadDetail();
    </script>
</body>

</html>
