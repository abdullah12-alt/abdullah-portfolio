<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="silver-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f2f2f2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a6a6a6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="20" fill="#0d0d0d" />
  <text x="50%" y="54%" dominant-baseline="central" text-anchor="middle" font-family="Outfit, Inter, sans-serif" font-size="45" font-weight="900" fill="url(#silver-grad)" filter="url(#glow)">AH</text>
</svg>
